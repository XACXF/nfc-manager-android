name: Android CI Simple
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
    - name: Build APK
      run: gradle wrapper --gradle-version 8.2 && gradle assembleDebug --stacktrace
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nfc-manager-apk
        path: app/build/outputs/apk/debug/*.apk
