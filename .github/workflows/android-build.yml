name: Android CI Final

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Check project structure
      run: |
        echo "Checking project structure..."
        ls -la
        ls -la app/ || echo "app directory not found"
        cat build.gradle 2>/dev/null || echo "build.gradle not found"
    
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        sudo mv gradle-8.2 /opt/gradle
        echo "/opt/gradle/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Build APK
      run: gradle assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nfc-manager-apk
        path: app/build/outputs/apk/debug/*.apk
